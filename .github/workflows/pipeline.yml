name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Tests
        run: echo "Tests passed!"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build
        run: echo "Build successful!"

  change-request:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: ServiceNow DevOps Change
        uses: ServiceNow/servicenow-devops-change@v3
        with:
          instance-url: ${{ secrets.empshiva.service-now.com }}
          tool-type: github
          job-name: ${{ github.job }}
          change-request: |
            {
              "setCloseCode": "true",
              "attributes": {
                "short_description": "Auto deployment from GitHub Actions",
                "assigned_to": "empshiva",
                "type": "standard"
              }
            }

  deploy:
    runs-on: ubuntu-latest
    needs: change-request
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Deploying to production!"
