name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Deploy (example)
        run: echo "Deploying to server..."
        # Replace with real deploy command e.g.:
        # run: npm run deploy
        # or use actions like AWS, Azure, Vercel etc.
