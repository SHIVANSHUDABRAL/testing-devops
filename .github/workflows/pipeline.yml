name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Job 1: Test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping install"
          fi

      - name: Run Tests
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "No test script found, skipping tests"
          fi

  # Job 2: Build
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build project
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script found, skipping build"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: |
            dist/
            build/
          if-no-files-found: ignore

  # Job 3: Create Change Request using basic auth
  create-change-request:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      change_sys_id: ${{ steps.create_cr.outputs.change_sys_id }}
      change_number: ${{ steps.create_cr.outputs.change_number }}
    steps:
      - name: Create Change Request in ServiceNow
        id: create_cr
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SN_INSTANCE_URL }}/api/now/table/change_request" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -u "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            -d '{
              "short_description": "Automated deployment from GitHub Actions",
              "description": "Commit: ${{ github.sha }} | Branch: ${{ github.ref_name }} | Actor: ${{ github.actor }}",
              "type": "normal",
              "category": "Software",
              "priority": "3",
              "risk": "2",
              "assignment_group": "Change Management"
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "Failed to create Change Request. HTTP Status: $HTTP_CODE"
            exit 1
          fi

          CHANGE_NUMBER=$(echo $BODY | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['number']['value'])" 2>/dev/null || echo "")
          CHANGE_SYS_ID=$(echo $BODY | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['sys_id']['value'])" 2>/dev/null || echo "")

          echo "Change Number: $CHANGE_NUMBER"
          echo "Sys ID: $CHANGE_SYS_ID"

          echo "change_number=$CHANGE_NUMBER" >> $GITHUB_OUTPUT
          echo "change_sys_id=$CHANGE_SYS_ID" >> $GITHUB_OUTPUT

      - name: Print Change Request URL
        run: |
          echo "CR Number: ${{ steps.create_cr.outputs.change_number }}"
          echo "URL: ${{ secrets.SN_INSTANCE_URL }}/nav_to.do?uri=change_request.do?sysparm_query=number=${{ steps.create_cr.outputs.change_number }}"

  # Job 4: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: create-change-request
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-output
        continue-on-error: true

      - name: Deploy
        run: echo "Deploying... CR ${{ needs.create-change-request.outputs.change_number }}"

      - name: Update CR to Implemented
        run: |
          curl -s -X PATCH \
            "${{ secrets.SN_INSTANCE_URL }}/api/now/table/change_request/${{ needs.create-change-request.outputs.change_sys_id }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -u "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
            -d '{
              "state": "3",
              "close_code": "successful",
              "close_notes": "Deployed via GitHub Actions. Commit: ${{ github.sha }}"
            }'
          echo "CR updated to Implemented"
